<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能研究助手 — NotebookLM v2.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #faf9f7; --card: #fff; --accent: #4a6cf7; --accent2: #6c5ce7;
            --text: #1a1a2e; --text2: #6b7280; --border: #e5e7eb;
            --shadow: 0 1px 3px rgba(0,0,0,0.06); --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; display: flex;
        }
        /* Sidebar */
        .sidebar {
            width: 320px; background: var(--card); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header h1 { font-size: 20px; margin-bottom: 4px; }
        .sidebar-header .sub { font-size: 13px; color: var(--text2); }
        
        /* Folder tree */
        .folder-tree { padding: 8px 12px; border-bottom: 1px solid var(--border); }
        .folder-tree .tree-title { font-size: 11px; text-transform: uppercase; color: var(--text2); padding: 6px; letter-spacing: 0.5px; }
        .folder-item {
            display: flex; align-items: center; padding: 8px 10px; border-radius: 8px;
            cursor: pointer; font-size: 14px; margin: 2px 0; transition: all 0.15s;
            justify-content: space-between;
        }
        .folder-item:hover { background: #f3f4f6; }
        .folder-item.active { background: #eef2ff; color: var(--accent); font-weight: 600; }
        .folder-item .fname { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .folder-item .fcount { font-size: 11px; color: var(--text2); background: #f3f4f6; padding: 1px 7px; border-radius: 10px; margin-left: 8px; }
        .folder-item.active .fcount { background: #dde4ff; color: var(--accent); }
        .folder-item .fdel { color: #ef4444; font-size: 14px; cursor: pointer; opacity: 0; transition: opacity 0.15s; margin-left: 4px; }
        .folder-item:hover .fdel { opacity: 0.6; }
        .folder-item .fdel:hover { opacity: 1; }
        .new-folder { display: flex; gap: 6px; padding: 8px 10px; }
        .new-folder input {
            flex: 1; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
            font-size: 13px; font-family: inherit; outline: none;
        }
        .new-folder input:focus { border-color: var(--accent); }
        .new-folder button {
            padding: 6px 12px; background: var(--accent); color: white; border: none;
            border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap;
        }
        .new-folder button:hover { opacity: 0.9; }
        
        .doc-list { flex: 1; overflow-y: auto; padding: 12px; }
        .doc-item {
            padding: 12px; border-radius: 10px; cursor: pointer;
            margin-bottom: 6px; border: 1px solid transparent; transition: all 0.2s;
        }
        .doc-item:hover { background: #f3f4f6; }
        .doc-item.active { background: #eef2ff; border-color: var(--accent); }
        .doc-item .title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .doc-item .meta { font-size: 12px; color: var(--text2); }
        .doc-item .summary { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .doc-item .actions { margin-top: 6px; display: flex; gap: 6px; align-items: center; }
        .doc-item .actions select {
            font-size: 11px; padding: 2px 6px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--card); color: var(--text2);
        }
        .doc-item .del { color: #ef4444; font-size: 12px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
        .doc-item:hover .del { opacity: 1; }
        .upload-area {
            margin: 12px; padding: 20px; border: 2px dashed var(--border);
            border-radius: var(--radius); text-align: center; cursor: pointer;
            transition: border-color 0.2s; color: var(--text2); font-size: 14px;
        }
        .upload-area:hover { border-color: var(--accent); color: var(--accent); }
        .upload-area input { display: none; }
        .upload-folder { margin: 0 12px 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .upload-folder select { font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); }
        
        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; max-width: 960px; }
        .main-header {
            padding: 20px 28px; border-bottom: 1px solid var(--border);
            display: flex; gap: 12px; align-items: center;
        }
        .main-header .tab {
            padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 600;
            cursor: pointer; border: 1px solid var(--border); background: var(--card);
            color: var(--text2); transition: all 0.2s;
        }
        .main-header .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
        .current-folder-badge {
            font-size: 13px; color: var(--accent); margin-left: auto;
            padding: 4px 12px; background: #eef2ff; border-radius: 10px;
        }
        .chat-area { flex: 1; overflow-y: auto; padding: 24px 28px; }
        .suggested-qs { margin-bottom: 16px; }
        .suggested-qs .sq-title { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
        .suggested-qs .sq-btn {
            display: inline-block; padding: 6px 14px; margin: 3px; background: #f3f4f6;
            border-radius: 14px; font-size: 13px; cursor: pointer; border: 1px solid var(--border);
            color: var(--text); transition: all 0.2s;
        }
        .suggested-qs .sq-btn:hover { background: #eef2ff; border-color: var(--accent); color: var(--accent); }
        .chat-msg { margin-bottom: 20px; max-width: 85%; }
        .chat-msg.user { margin-left: auto; }
        .chat-msg .bubble {
            padding: 14px 18px; border-radius: 16px; font-size: 15px; line-height: 1.6;
        }
        .chat-msg.user .bubble { background: var(--accent); color: white; border-radius: 16px 16px 4px 16px; }
        .chat-msg.assistant .bubble { background: var(--card); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; }
        .chat-msg .sources { margin-top: 8px; font-size: 12px; color: var(--text2); }
        .chat-msg .source-tag {
            display: inline-block; padding: 2px 10px; background: #eef2ff;
            border-radius: 10px; margin: 2px; color: var(--accent); cursor: pointer;
        }
        .chat-input-area {
            padding: 16px 28px; border-top: 1px solid var(--border); display: flex; gap: 10px;
        }
        .chat-input-area textarea {
            flex: 1; padding: 12px 16px; border-radius: 14px; border: 1.5px solid var(--border);
            font-size: 15px; font-family: inherit; resize: none; outline: none; height: 48px;
            transition: border-color 0.2s;
        }
        .chat-input-area textarea:focus { border-color: var(--accent); }
        .chat-input-area button {
            padding: 12px 24px; background: var(--accent); color: white; border: none;
            border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .podcast-area { display: none; flex: 1; overflow-y: auto; padding: 24px 28px; }
        .podcast-script {
            background: var(--card); border-radius: var(--radius); padding: 24px;
            border: 1px solid var(--border); font-size: 15px; line-height: 2;
        }
        .podcast-script .host { color: var(--accent); font-weight: 600; }
        .podcast-script .expert { color: var(--accent2); font-weight: 600; }
        .podcast-controls { padding: 16px 28px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; }
        .podcast-controls select, .podcast-controls input, .podcast-controls button {
            padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border);
            font-size: 14px; cursor: pointer; background: var(--card);
        }
        .podcast-controls button.primary { background: var(--accent); color: white; border: none; }
        .audio-player { margin-top: 16px; width: 100%; }
        .empty-state { text-align: center; padding: 80px 40px; color: var(--text2); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #1a1a2e; color: white; padding: 12px 24px;
            border-radius: 24px; font-size: 14px; font-weight: 600;
            z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: static; max-height: 45vh; }
            .main { height: auto; min-height: 55vh; }
        }
    </style>

<script src="/static/marked.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>📚 智能研究助手 v2.1</h1>
            <div class="sub">文件夹 · 向量搜索 · PDF · 播客</div>
        </div>
        
        <!-- Folder Tree -->
        <div class="folder-tree">
            <div class="tree-title">📁 分类</div>
            <div id="folder-list">
                <div class="folder-item active" onclick="selectFolder('')" data-fid="">
                    <span class="fname">📂 全部文档</span>
                </div>
                <div class="folder-item" onclick="selectFolder('uncategorized')" data-fid="uncategorized">
                    <span class="fname">📄 未分类</span>
                    <span class="fcount" id="uncat-count">0</span>
                </div>
            </div>
            <div class="new-folder">
                <input type="text" id="new-folder-name" placeholder="新建分类..." onkeydown="if(event.key==='Enter')createFolder()">
                <button onclick="createFolder()">+</button>
            </div>
        </div>
        
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            📤 点击上传文档<br><small>支持 txt、md、pdf、docx、csv、json</small>
            <input type="file" id="file-input" accept=".txt,.md,.pdf,.docx,.csv,.json" onchange="uploadFile(this)">
        </div>
        <div class="upload-folder">
            上传到：<select id="upload-folder-sel"><option value="">未分类</option></select>
        </div>
        
        <div class="doc-list" id="doc-list">
            <div style="padding:20px;text-align:center;color:#9ca3af;font-size:14px;">暂无文档，点击上方上传</div>
        </div>
    </div>

    <div class="main">
        <div class="main-header">
            <div class="tab active" onclick="switchView('chat')">💬 问答</div>
            <div class="tab" onclick="switchView('podcast')">🎙️ 播客</div>
            <div class="current-folder-badge" id="folder-badge">全部文档</div>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="suggested-qs" id="suggested-qs" style="display:none">
                <div class="sq-title">💡 建议问题：</div>
                <div id="sq-buttons"></div>
            </div>
            <div class="empty-state" id="chat-empty">
                <div class="icon">📖</div>
                <h2>上传文档开始研究</h2>
                <p>支持 PDF / DOCX / TXT / MD，按文件夹分类管理</p>
            </div>
        </div>

        <div class="podcast-area" id="podcast-area">
            <div class="empty-state" id="podcast-empty">
                <div class="icon">🎙️</div>
                <h2>AI 双人播客</h2>
                <p>选择文档和主题，AI 生成自然对话 + TTS 语音</p>
            </div>
            <div id="podcast-content"></div>
        </div>

        <div class="chat-input-area" id="chat-input-area">
            <textarea id="query-input" placeholder="向文档提问...（支持多轮对话）" rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askQuestion()}"></textarea>
            <button onclick="askQuestion()">发送</button>
        </div>

        <div class="podcast-controls" id="podcast-controls" style="display:none">
            <select id="podcast-doc"><option value="">全部文档</option></select>
            <input type="text" id="podcast-topic" placeholder="播客主题（可选）" style="flex:1">
            <button class="primary" onclick="generatePodcast()">🎙️ 生成播客</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

<script>
var API = '';
var currentView = 'chat';
var activeDocId = '';
var activeFolderId = '';
var allDocs = [];
var allFolders = [];
var chatHistory = [];
var suggestedQs = [];

async function init() {
    await loadFolders();
    await loadDocs();
}

function switchView(view) {
    currentView = view;
    document.querySelectorAll('.tab').forEach(function(t,i) {
        t.classList.toggle('active', (i===0 && view==='chat') || (i===1 && view==='podcast'));
    });
    document.getElementById('chat-area').style.display = view==='chat' ? 'block' : 'none';
    document.getElementById('chat-input-area').style.display = view==='chat' ? 'flex' : 'none';
    document.getElementById('podcast-area').style.display = view==='podcast' ? 'block' : 'none';
    document.getElementById('podcast-controls').style.display = view==='podcast' ? 'flex' : 'none';
    if (view==='podcast') updatePodcastSelect();
}

// ─── Folders ───
async function loadFolders() {
    var res = await fetch(API + '/api/folders');
    var data = await res.json();
    allFolders = data.folders || [];
    renderFolderTree();
    updateUploadSelect();
}

function renderFolderTree() {
    var container = document.getElementById('folder-list');
    var uncatCount = 0;
    
    var html = '<div class="folder-item' + (activeFolderId === '' ? ' active' : '') + '" onclick="selectFolder(\'\')" data-fid="">';
    html += '<span class="fname">📂 全部文档</span></div>';
    
    // Count uncategorized from allDocs
    uncatCount = allDocs.filter(function(d) { return !d.folder_id; }).length;
    html += '<div class="folder-item' + (activeFolderId === 'uncategorized' ? ' active' : '') + '" onclick="selectFolder(\'uncategorized\')" data-fid="uncategorized">';
    html += '<span class="fname">📄 未分类</span>';
    html += '<span class="fcount">' + uncatCount + '</span></div>';
    
    allFolders.forEach(function(f) {
        html += '<div class="folder-item' + (activeFolderId === f.id ? ' active' : '') + '" onclick="selectFolder(\'' + f.id + '\')" data-fid="' + f.id + '">';
        html += '<span class="fname">📁 ' + f.name + '</span>';
        html += '<span class="fcount">' + f.doc_count + '</span>';
        html += '<span class="fdel" onclick="event.stopPropagation();deleteFolder(\'' + f.id + '\')" title="删除">×</span>';
        html += '</div>';
    });
    
    // Double-click to rename
    html = html.replace(/onclick="selectFolder/g, 'ondblclick="renameFolderPrompt(this)" onclick="selectFolder');
    
    container.innerHTML = html;
    updateUploadSelect();
}

async function selectFolder(fid) {
    activeFolderId = fid;
    activeDocId = '';
    chatHistory = [];
    renderFolderTree();
    
    var badge = document.getElementById('folder-badge');
    if (!fid) badge.textContent = '全部文档';
    else if (fid === 'uncategorized') badge.textContent = '未分类';
    else {
        var f = allFolders.find(function(x) { return x.id === fid; });
        badge.textContent = f ? f.name : fid;
    }
    
    await loadDocs();
    document.getElementById('suggested-qs').style.display = 'none';
}

async function createFolder() {
    var input = document.getElementById('new-folder-name');
    var name = input.value.trim();
    if (!name) return;
    
    var res = await fetch(API + '/api/folders', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name})
    });
    var data = await res.json();
    if (data.ok) {
        toast('✅ 已创建：' + name);
        input.value = '';
        await loadFolders();
    }
}

async function renameFolderPrompt(el) {
    var fid = el.getAttribute('data-fid');
    if (!fid || fid === '' || fid === 'uncategorized') return;
    var f = allFolders.find(function(x) { return x.id === fid; });
    if (!f) return;
    var newName = prompt('重命名分类：', f.name);
    if (!newName || newName.trim() === f.name) return;
    
    var res = await fetch(API + '/api/folders/' + fid, {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: newName.trim()})
    });
    if ((await res.json()).ok) {
        toast('✅ 已重命名');
        await loadFolders();
    }
}

async function deleteFolder(fid) {
    if (!confirm('删除此分类？文档将移入"未分类"。')) return;
    await fetch(API + '/api/folders/' + fid, {method: 'DELETE'});
    if (activeFolderId === fid) selectFolder('');
    await loadFolders();
}

function updateUploadSelect() {
    var sel = document.getElementById('upload-folder-sel');
    sel.innerHTML = '<option value="">未分类</option>';
    allFolders.forEach(function(f) {
        sel.innerHTML += '<option value="' + f.id + '">' + f.name + '</option>';
    });
}

// ─── Documents ───
async function loadDocs() {
    var url = API + '/api/docs';
    if (activeFolderId) url += '?folder_id=' + activeFolderId;
    var res = await fetch(url);
    var data = await res.json();
    allDocs = data.documents || [];
    renderDocList();
    updatePodcastSelect();
}

function renderDocList() {
    var container = document.getElementById('doc-list');
    if (!allDocs.length) {
        container.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:14px;">暂无文档，点击上方上传</div>';
        return;
    }
    var html = '';
    allDocs.forEach(function(d) {
        html += '<div class="doc-item' + (d.id === activeDocId ? ' active' : '') + '">';
        html += '<span class="del" onclick="deleteDoc(\'' + d.id + '\')">✕</span>';
        html += '<div class="title" onclick="selectDoc(\'' + d.id + '\')">📄 ' + d.title + '</div>';
        html += '<div class="meta">' + d.chunks + ' 段落 · ' + formatSize(d.size) + '</div>';
        if (d.summary) html += '<div class="summary">' + d.summary + '</div>';
        html += '<div class="actions">';
        html += '<select onchange="moveDoc(\'' + d.id + '\', this.value)" onclick="event.stopPropagation()">';
        html += '<option value="">📂 未分类</option>';
        allFolders.forEach(function(f) {
            html += '<option value="' + f.id + '"' + (d.folder_id === f.id ? ' selected' : '') + '>' + f.name + '</option>';
        });
        html += '</select></div>';
        html += '</div>';
    });
    container.innerHTML = html;
}

async function selectDoc(id) {
    activeDocId = (activeDocId === id) ? '' : id;
    renderDocList();
    chatHistory = [];
    if (id && currentView === 'chat') {
        loadSuggested(id);
    }
}

async function moveDoc(docId, folderId) {
    var res = await fetch(API + '/api/docs/' + docId + '/move', {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({folder_id: folderId || null})
    });
    var data = await res.json();
    if (data.ok) {
        toast('已移动');
        await loadDocs();
        await loadFolders();
    }
}

async function deleteDoc(id) {
    if (!confirm('确定删除此文档？')) return;
    await fetch(API + '/api/docs/' + id, {method:'DELETE'});
    if (activeDocId === id) { activeDocId = ''; chatHistory = []; }
    await loadDocs();
    await loadFolders();
    toast('已删除');
}

async function uploadFile(input) {
    var file = input.files[0];
    if (!file) return;
    var folderId = document.getElementById('upload-folder-sel').value;
    var form = new FormData();
    form.append('file', file);
    if (folderId) form.append('folder_id', folderId);
    
    toast('处理中...');
    
    var res = await fetch(API + '/api/upload', {method:'POST', body:form});
    var data = await res.json();
    input.value = '';
    
    if (data.ok) {
        toast('✅ ' + data.doc.title + ' — ' + data.doc.chunks + ' 段落');
        suggestedQs = data.doc.suggested || [];
        await loadDocs();
        await loadFolders();
        if (data.doc.id) {
            activeDocId = data.doc.id;
            renderDocList();
            renderSuggestedQs();
        }
    } else {
        toast('❌ ' + (data.error || '上传失败'));
    }
}

// ─── Q&A ───
function renderSuggestedQs() {
    var container = document.getElementById('suggested-qs');
    var buttons = document.getElementById('sq-buttons');
    if (!suggestedQs.length) { container.style.display = 'none'; return; }
    container.style.display = 'block';
    buttons.innerHTML = suggestedQs.map(function(q) {
        return '<span class="sq-btn" onclick="askSuggested(\'' + q.replace(/'/g, "\\'") + '\')">' + q + '</span>';
    }).join('');
}

async function loadSuggested(docId) {
    var res = await fetch(API + '/api/suggest', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({doc_id: docId})
    });
    var data = await res.json();
    suggestedQs = data.questions || [];
    renderSuggestedQs();
}

function askSuggested(q) {
    document.getElementById('query-input').value = q;
    askQuestion();
}

async function askQuestion() {
    var input = document.getElementById('query-input');
    var query = input.value.trim();
    if (!query) return;
    if (!allDocs.length) { toast('请先上传文档'); return; }

    addMessage('user', query);
    input.value = '';
    chatHistory.push({role:'user', content:query});

    var loadingId = addMessage('assistant', '⏳ 搜索并分析中...', true);

    var body = {query:query, doc_id:activeDocId, folder_id:activeFolderId, history:chatHistory.slice(0,-1)};
    var res = await fetch(API + '/api/ask', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
    });
    var data = await res.json();

    removeMessage(loadingId);

    var answerHtml = data.answer || '无回答';
    if (data.sources && data.sources.length) {
        answerHtml += '<div class="sources">';
        data.sources.forEach(function(s) {
            answerHtml += '<span class="source-tag">📎 ' + s.title + '</span>';
        });
        answerHtml += '</div>';
    }
    addMessage('assistant', answerHtml);
    chatHistory.push({role:'assistant', content:data.answer || ''});
    document.getElementById('chat-empty').style.display = 'none';
}

function addMessage(role, content, isTemp) {
    var area = document.getElementById('chat-area');
    var div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    if (isTemp) div.id = 'temp-msg';
    if (role === 'assistant' && typeof marked !== 'undefined') {
            div.innerHTML = '<div class="bubble">' + marked.parse(content) + '</div>';
        } else {
            div.innerHTML = '<div class="bubble">' + content + '</div>';
        }
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return isTemp ? 'temp-msg' : null;
}

function removeMessage(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
}

// ─── Podcast ───
async function generatePodcast() {
    if (!allDocs.length) { toast('请先上传文档'); return; }
    var topic = document.getElementById('podcast-topic').value.trim();
    var docId = document.getElementById('podcast-doc').value;
    
    var area = document.getElementById('podcast-content');
    area.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><h2>生成播客中...</h2></div>';
    document.getElementById('podcast-empty').style.display = 'none';

    var body = {doc_id: docId, folder_id: activeFolderId, topic: topic};
    var res = await fetch(API + '/api/podcast', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
    });
    var data = await res.json();

    if (data.error) {
        area.innerHTML = '<div class="empty-state"><h2>❌ ' + data.error + '</h2></div>';
        return;
    }

    var html = '<div class="podcast-script">';
    html += '<h2 style="margin-bottom:16px">🎙️ ' + data.title + '</h2>';
    if (data.audio_url) {
        html += '<audio class="audio-player" controls><source src="' + data.audio_url + '" type="audio/mpeg"></audio>';
    }
    var lines = data.script.split('\n');
    lines.forEach(function(line) {
        line = line.trim();
        if (!line) return;
        if (line.startsWith('[A]')) {
            html += '<div class="line"><span class="host">🎤 主持人：</span>' + line.substring(3) + '</div>';
        } else if (line.startsWith('[B]')) {
            html += '<div class="line"><span class="expert">🎓 专家：</span>' + line.substring(3) + '</div>';
        } else {
            html += '<div class="line">' + line + '</div>';
        }
    });
    html += '</div>';
    area.innerHTML = html;
    toast('✅ 播客脚本已生成' + (data.audio_url ? ' + 语音' : ''));
}

function updatePodcastSelect() {
    var sel = document.getElementById('podcast-doc');
    sel.innerHTML = '<option value="">全部文档</option>';
    allDocs.forEach(function(d) {
        sel.innerHTML += '<option value="' + d.id + '">' + d.title + '</option>';
    });
}

function formatSize(bytes) {
    if (!bytes) return '0 B';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 3000);
}
init();
