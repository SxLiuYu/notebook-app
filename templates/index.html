<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebook — AI 研究助手</title>
<script src="/static/marked.min.js"></script>
<style>
:root{
  --bg:#faf7f2;--card:#fff;--accent:#1a73e8;--accent-light:#e8f0fe;--accent-dark:#1557b0;
  --text:#202124;--text2:#5f6368;--text3:#80868b;--border:#e0e0e0;--border-light:#eee;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 4px 16px rgba(0,0,0,.1);
  --radius:14px;--radius-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
  --sidebar-w:280px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden;transition:.25s}
body.sidebar-collapsed{--sidebar-w:0}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);
  height:100vh;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  transition:width .25s,margin-left .25s;position:relative;z-index:10
}
body.sidebar-collapsed .sidebar{margin-left:calc(var(--sidebar-w)*-1)}
.sidebar-toggle{
  position:fixed;top:14px;left:calc(var(--sidebar-w) + 12px);z-index:20;
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;
  color:var(--text2);transition:left .25s,transform .25s;box-shadow:var(--shadow)
}
body.sidebar-collapsed .sidebar-toggle{left:12px}
.sidebar-toggle:hover{background:#f1f3f4}
.sidebar-toggle .arr{transition:transform .25s}
body.sidebar-collapsed .arr{transform:rotate(180deg)}
.sidebar-brand{padding:16px 16px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sidebar-brand .logo{width:30px;height:30px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700}
.sidebar-brand h1{font-size:15px;font-weight:600}
.sidebar-inner{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-inner::-webkit-scrollbar{width:4px}
.sidebar-inner::-webkit-scrollbar-thumb{background:#dadce0;border-radius:4px}

.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);letter-spacing:.6px;padding:8px 14px 4px}
.folder-item{
  display:flex;align-items:center;padding:8px 12px;margin:1px 8px;border-radius:8px;
  cursor:pointer;font-size:13px;gap:6px;transition:.12s;user-select:none
}
.folder-item:hover{background:#f1f3f4}
.folder-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.folder-item .ficon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.folder-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-item .fextra{display:flex;align-items:center;gap:4px;flex-shrink:0}
.folder-item .fcount{font-size:10px;color:var(--text3);background:#f1f3f4;padding:1px 7px;border-radius:8px}
.folder-item.active .fcount{background:#d2e3fc;color:var(--accent)}
.folder-item .fdel{color:#ea4335;font-size:11px;opacity:0;transition:.15s}
.folder-item:hover .fdel{opacity:.6}
.folder-item .fdel:hover{opacity:1}
.folder-item .fknow{color:var(--accent);font-size:11px;opacity:0;transition:.15s}
.folder-item:hover .fknow{opacity:.7}
.folder-item .fknow:hover{opacity:1}

.new-folder{display:flex;gap:4px;padding:4px 14px 12px}
.new-folder input{
  flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;outline:none;background:#f8f9fa
}
.new-folder input:focus{border-color:var(--accent);background:#fff}
.new-folder button{padding:7px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.new-folder button:hover{background:var(--accent-dark)}

.doc-list{padding:0 8px}
.doc-item{padding:12px;border-radius:8px;cursor:pointer;margin:2px 0;border:1.5px solid transparent;transition:.15s;position:relative}
.doc-item:hover{background:#f8f9fa}
.doc-item.active{background:var(--accent-light);border-color:var(--accent)}
.doc-item .doc-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.doc-item .doc-meta{font-size:11px;color:var(--text3)}
.doc-item .doc-del{position:absolute;top:6px;right:6px;color:#ea4335;font-size:11px;opacity:0;transition:.15s;padding:2px}
.doc-item:hover .doc-del{opacity:.7}

.upload-zone{
  margin:6px 8px 10px;padding:14px;border:2px dashed var(--border);border-radius:8px;
  text-align:center;cursor:pointer;transition:.2s;background:#fafafa;flex-shrink:0
}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-light)}
.upload-zone .uz-text{font-size:12px;color:var(--text2);font-weight:500}
.upload-zone .uz-hint{font-size:10px;color:var(--text3);margin-top:2px}
.upload-zone input{display:none}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}
.main-header{padding:10px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:4px;background:var(--card);flex-shrink:0}
.main-header .tab{
  padding:7px 16px;border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;
  border:none;background:transparent;color:var(--text2);transition:.15s
}
.main-header .tab:hover{background:#f1f3f4;color:var(--text)}
.main-header .tab.active{background:var(--accent);color:#fff}
.main-header .folder-badge{margin-left:auto;font-size:12px;color:var(--text3)}
.main-body{flex:1;display:flex;overflow:hidden}

/* CHAT + HISTORY */
.chat-section{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-area{flex:1;overflow-y:auto;padding:0}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:#dadce0;border-radius:4px}
.chat-inner{max-width:700px;margin:0 auto;padding:24px 20px}

.suggested-qs{margin-bottom:20px}
.sq-chips{display:flex;flex-wrap:wrap;gap:6px}
.sq-chip{
  padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;
  font-size:12.5px;cursor:pointer;color:var(--text2);transition:.15s
}
.sq-chip:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

.chat-msg{margin-bottom:20px}
.chat-msg.user{display:flex;justify-content:flex-end}
.chat-msg.user .bubble{
  background:var(--accent);color:#fff;padding:12px 18px;border-radius:18px 18px 4px 18px;
  font-size:14px;line-height:1.5;max-width:80%;word-wrap:break-word
}
.chat-msg.assistant .bubble{
  background:var(--card);border:1px solid var(--border-light);padding:16px 22px;
  border-radius:4px 18px 18px 18px;font-size:14px;line-height:1.65;box-shadow:var(--shadow)
}
.chat-msg.assistant .bubble table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.chat-msg.assistant .bubble th,.chat-msg.assistant .bubble td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.chat-msg.assistant .bubble th{background:#f8f9fa;font-weight:600}
.chat-msg.assistant .bubble code{background:#f1f3f4;padding:2px 5px;border-radius:4px;font-size:12.5px}
.chat-msg.assistant .bubble pre{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;overflow-x:auto;font-size:12.5px;margin:8px 0}
.chat-msg.assistant .bubble pre code{background:none;padding:0;color:inherit}
.chat-msg .sources{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.chat-msg .source-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;background:var(--accent-light);border-radius:12px;font-size:11px;color:var(--accent);cursor:pointer}
.chat-msg.assistant .bubble blockquote{border-left:3px solid var(--accent);padding:6px 12px;margin:8px 0;background:#f8f9fa;border-radius:0 6px 6px 0;color:var(--text2);font-size:13px}

/* HISTORY PANEL */
.history-panel{
  width:260px;border-left:1px solid var(--border-light);background:var(--card);overflow-y:auto;
  flex-shrink:0;display:flex;flex-direction:column;transition:width .25s;font-size:12px
}
.history-panel.collapsed{width:0;overflow:hidden}
.history-panel .hp-header{padding:12px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:6px;flex-shrink:0}
.history-panel .hp-title{font-weight:600;font-size:12px;flex:1}
.history-panel .hp-toggle{cursor:pointer;color:var(--text3);font-size:14px;padding:2px 6px;border-radius:4px}
.history-panel .hp-toggle:hover{background:#f1f3f4}
.history-panel .hp-list{flex:1;overflow-y:auto;padding:4px}
.history-panel .hp-item{
  padding:6px 8px;margin:2px 0;border-radius:6px;cursor:pointer;font-size:11.5px;
  color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:.1s
}
.history-panel .hp-item:hover{background:#f1f3f4}
.history-panel .hp-item.user{color:var(--text3)}
.history-panel .hp-item.assistant{color:var(--accent)}

.chat-input-wrap{padding:12px 20px;background:var(--card);border-top:1px solid var(--border-light);flex-shrink:0}
.chat-input-inner{max-width:700px;margin:0 auto;display:flex;gap:8px}
.chat-input-inner textarea{
  flex:1;padding:11px 16px;border-radius:20px;border:1.5px solid var(--border);font-size:14px;
  font-family:var(--font);resize:none;outline:none;height:44px;transition:.2s;background:#fafafa;line-height:1.4
}
.chat-input-inner textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(26,115,232,.12)}
.chat-input-inner button{
  padding:0 24px;background:var(--accent);color:#fff;border:none;border-radius:20px;
  font-size:14px;font-weight:600;cursor:pointer;transition:.15s;flex-shrink:0
}
.chat-input-inner button:hover{background:var(--accent-dark)}
.chat-input-inner button:disabled{opacity:.5}

/* PODCAST */
.podcast-area{display:none;flex:1;overflow-y:auto}
.podcast-inner{max-width:700px;margin:0 auto;padding:24px 20px}
.podcast-controls{padding:12px 20px;background:var(--card);border-top:1px solid var(--border-light);display:flex;gap:8px;flex-shrink:0}
.podcast-controls select,.podcast-controls input{padding:8px 14px;border-radius:18px;border:1px solid var(--border);font-size:13px;font-family:var(--font);outline:none;background:#fafafa}
.podcast-controls input{flex:1;min-width:120px}
.podcast-controls button.primary{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:18px;font-size:13px;font-weight:600;cursor:pointer}
.podcast-controls button.primary:hover{background:var(--accent-dark)}
.podcast-script{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid var(--border-light);font-size:14px;line-height:1.9;box-shadow:var(--shadow)}
.podcast-script .speaker{font-weight:700;margin-right:4px}
.podcast-script .host{color:var(--accent)}
.podcast-script .expert{color:#ea4335}
.audio-player{width:100%;margin-top:12px;border-radius:8px}

/* KNOWLEDGE MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:90%;max-width:720px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px;flex-shrink:0}
.modal-header h2{font-size:16px;flex:1}
.modal-close{cursor:pointer;font-size:20px;color:var(--text3);padding:4px;border-radius:4px}
.modal-close:hover{background:#f1f3f4}
.modal-body{flex:1;overflow-y:auto;padding:20px}

.modal-tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border-light)}
.modal-tab{padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500;border-bottom:2px solid transparent;transition:.15s}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-tab-content{display:none;font-size:13.5px;line-height:1.7}
.modal-tab-content.active{display:block}
.modal-tab-content h2,.modal-tab-content h3{margin-bottom:8px}
.modal-tab-content p{margin-bottom:6px}
.modal-tab-content ul,.modal-tab-content ol{padding-left:18px;margin-bottom:8px}

/* MINDMAP */
.mindmap-tree{padding:8px 0}
.mindmap-node{margin-left:16px;position:relative}
.mindmap-node::before{content:'';position:absolute;left:-14px;top:0;bottom:0;width:1px;background:var(--border)}
.mindmap-node:last-child::before{height:12px}
.mindmap-node .mn-label{
  padding:4px 10px;background:var(--accent-light);border-radius:6px;display:inline-block;
  font-weight:500;font-size:12px;margin:3px 0;color:var(--accent);position:relative
}
.mindmap-node .mn-label::before{content:'';position:absolute;left:-14px;top:50%;width:14px;height:1px;background:var(--border)}
.mindmap-root>.mn-label{background:var(--accent);color:#fff;font-size:13px;padding:6px 14px}
.mindmap-root::before{display:none}
.mindmap-root>.mn-label::before{display:none}

.empty-state{text-align:center;padding:60px 30px}
.empty-state .es-icon{font-size:44px;margin-bottom:12px;opacity:.8}
.empty-state h2{font-size:18px;margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--text2);max-width:360px;margin:0 auto}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#202124;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.toast.show{opacity:1}

@media(max-width:768px){
  body{flex-direction:column}
  .sidebar{width:100%!important;height:auto;max-height:35vh;margin-left:0!important}
  body.sidebar-collapsed .sidebar{max-height:0}
  .sidebar-toggle{top:8px;left:8px}
  .history-panel{display:none}
}
</style>
</head>
<body>
<button class="sidebar-toggle" onclick="toggleSidebar()" title="收起侧栏"><span class="arr">◀</span></button>

<div class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">N</div>
    <h1>Notebook</h1>
  </div>
  <div class="sidebar-inner">
    <div class="sec-title">分类</div>
    <div id="folder-list"></div>
    <div class="new-folder">
      <input id="new-folder-name" placeholder="新建..." onkeydown="event.key==='Enter'&&createFolder()">
      <button onclick="createFolder()">+</button>
    </div>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="uz-text">📤 上传文档</div>
      <div class="uz-hint">PDF · DOCX · TXT · MD</div>
      <input type="file" id="file-input" accept=".txt,.md,.pdf,.docx,.csv,.json" onchange="uploadFile(this)">
    </div>
    <div class="sec-title">文档</div>
    <div class="doc-list" id="doc-list"></div>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <button class="tab active" onclick="switchView('chat')">💬 问答</button>
    <button class="tab" onclick="switchView('podcast')">🎙️ 播客</button>
    <span class="folder-badge" id="folder-badge">全部文档</span>
    <button class="tab" id="history-toggle-btn" onclick="toggleHistory()" style="margin-left:4px;font-size:12px">📋 历史</button>
  </div>

  <div class="main-body">
    <!-- CHAT -->
    <div class="chat-section" id="chat-section">
      <div class="chat-area" id="chat-area">
        <div class="chat-inner" id="chat-inner">
          <div class="suggested-qs" id="suggested-qs" style="display:none">
            <div class="sq-chips" id="sq-chips"></div>
          </div>
          <div class="empty-state" id="chat-empty">
            <div class="es-icon">📖</div>
            <h2>上传文档开始探索</h2>
            <p>上传 PDF、DOCX 或文本文件，AI 帮你分析、总结、回答</p>
          </div>
        </div>
      </div>
      <div class="chat-input-wrap" id="chat-input-wrap">
        <div class="chat-input-inner">
          <textarea id="query-input" placeholder="向文档提问..." rows="1" onkeydown="event.key==='Enter'&&!event.shiftKey&&(event.preventDefault(),askQuestion())"></textarea>
          <button onclick="askQuestion()">发送</button>
        </div>
      </div>
    </div>

    <!-- PODCAST -->
    <div class="podcast-area" id="podcast-area">
      <div class="podcast-inner" id="podcast-inner">
        <div class="empty-state" id="podcast-empty">
          <div class="es-icon">🎙️</div><h2>AI 双人播客</h2><p>基于文档生成对话，支持 TTS 语音</p>
        </div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="history-panel collapsed" id="history-panel">
      <div class="hp-header">
        <span class="hp-title">💬 对话历史</span>
        <span class="hp-toggle" onclick="toggleHistory()">✕</span>
      </div>
      <div class="hp-list" id="hp-list"></div>
    </div>
  </div>

  <div class="podcast-controls" id="podcast-controls" style="display:none">
    <select id="podcast-doc"><option value="">全部文档</option></select>
    <input id="podcast-topic" placeholder="播客主题（可选）">
    <button class="primary" onclick="generatePodcast()">🎙️ 生成</button>
  </div>
</div>

<!-- KNOWLEDGE MODAL -->
<div class="modal-overlay" id="knowledge-modal" style="display:none" onclick="event.target===this&&closeKnowledge()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="km-title">📊 知识梳理</h2>
      <button class="modal-close" onclick="closeKnowledge()">✕</button>
    </div>
    <div class="modal-body" id="km-body">
      <div class="modal-tabs">
        <div class="modal-tab active" onclick="switchKmTab('summary',this)">📝 知识总结</div>
        <div class="modal-tab" onclick="switchKmTab('mindmap',this)">🧠 思维导图</div>
        <div class="modal-tab" onclick="switchKmTab('learning',this)">📚 学习路径</div>
      </div>
      <div class="modal-tab-content active" id="km-summary"></div>
      <div class="modal-tab-content" id="km-mindmap"></div>
      <div class="modal-tab-content" id="km-learning"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API='',currentView='chat',activeDocId='',activeFolderId='',allDocs=[],allFolders=[],chatHistory=[],suggestedQs=[],TOAST_T,mindmapData=null,kmSummary='',kmLearning='';

function toast(m,d){clearTimeout(TOAST_T);var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');TOAST_T=setTimeout(function(){e.classList.remove('show')},d||2500)}
function formatSize(b){if(!b)return'0B';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}

async function init(){await loadFolders();await loadDocs()}

function toggleSidebar(){document.body.classList.toggle('sidebar-collapsed')}
function toggleHistory(){document.getElementById('history-panel').classList.toggle('collapsed')}

function switchView(v){
  currentView=v;
  document.querySelectorAll('.main-header .tab').forEach(function(t,i){
    t.classList.toggle('active',(i==0&&v=='chat')||(i==1&&v=='podcast')||t.id==='history-toggle-btn')
  });
  document.getElementById('chat-section').style.display=v=='chat'?'flex':'none';
  document.getElementById('chat-input-wrap').style.display=v=='chat'?'flex':'none';
  document.getElementById('podcast-area').style.display=v=='podcast'?'block':'none';
  document.getElementById('podcast-controls').style.display=v=='podcast'?'flex':'none';
  if(v=='podcast')updatePodcastSelect()
}

// ─── FOLDERS ───
async function loadFolders(){
  var r=await fetch(API+'/api/folders'),d=await r.json();allFolders=d.folders||[];renderFolders()
}
function renderFolders(){
  var l=document.getElementById('folder-list'),h='';
  h+=fItem('','📂','全部文档','',activeFolderId==='');
  var uc=allDocs.filter(function(d){return!d.folder_id}).length;
  h+=fItem('uncategorized','📄','未分类',uc,activeFolderId==='uncategorized');
  allFolders.forEach(function(f){h+=fItem(f.id,'📁',f.name,f.doc_count||0,activeFolderId===f.id)});
  l.innerHTML=h
}
function fItem(id,icon,name,count,active){
  var c=active?' active':'',kid=id&&id!=='uncategorized'?id:'';
  return '<div class="folder-item'+c+'" onclick="selectFolder(\''+id+'\')" ondblclick="renameFolderPrompt(\''+id+'\')">'+
    '<span class="ficon">'+icon+'</span><span class="fname">'+name+'</span>'+
    '<span class="fextra">'+(count!==''?'<span class="fcount">'+count+'</span>':'')+
    (kid?'<span class="fknow" onclick="event.stopPropagation();openKnowledge(\''+kid+'\')" title="知识梳理">📊</span>':'')+
    (kid?'<span class="fdel" onclick="event.stopPropagation();deleteFolder(\''+kid+'\')">×</span>':'')+
    '</span></div>'
}
async function selectFolder(fid){
  if(activeFolderId===fid)return;activeFolderId=fid;activeDocId='';chatHistory=[];renderHistory();
  renderFolders();var b=document.getElementById('folder-badge');
  if(!fid)b.textContent='📂 全部';else if(fid==='uncategorized')b.textContent='📄 未分类';
  else{var f=allFolders.find(function(x){return x.id===fid});b.textContent='📁 '+(f?f.name:fid)}
  await loadDocs();document.getElementById('suggested-qs').style.display='none'
}
async function createFolder(){
  var n=document.getElementById('new-folder-name').value.trim();if(!n)return;
  var r=await fetch(API+'/api/folders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});
  if((await r.json()).ok){toast('已创建：'+n);document.getElementById('new-folder-name').value='';await loadFolders()}
}
async function renameFolderPrompt(id){
  if(!id||id==='uncategorized')return;var f=allFolders.find(function(x){return x.id===id});if(!f)return;
  var n=prompt('重命名：',f.name);if(!n||n.trim()===f.name)return;
  await fetch(API+'/api/folders/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n.trim()})});
  toast('已重命名');await loadFolders()
}
async function deleteFolder(id){
  if(!confirm('删除此分类？文档移入未分类。'))return;await fetch(API+'/api/folders/'+id,{method:'DELETE'});
  if(activeFolderId===id)selectFolder('');await loadFolders()
}

// ─── DOCS ───
async function loadDocs(){
  var u=API+'/api/docs';if(activeFolderId)u+='?folder_id='+activeFolderId;
  var r=await fetch(u),d=await r.json();allDocs=d.documents||[];renderDocs();updatePodcastSelect()
}
function renderDocs(){
  var c=document.getElementById('doc-list');
  if(!allDocs.length){c.innerHTML='<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">暂无文档</div>';return}
  var h='';allDocs.forEach(function(d){h+='<div class="doc-item'+(d.id===activeDocId?' active':'')+'" onclick="selectDoc(\''+d.id+'\')"><span class="doc-del" onclick="event.stopPropagation();deleteDoc(\''+d.id+'\')">✕</span><div class="doc-title">'+d.title+'</div><div class="doc-meta">'+d.chunks+' 段落</div></div>'});
  c.innerHTML=h
}
async function selectDoc(id){
  if(activeDocId!==id){activeDocId=id;chatHistory=[];renderHistory();if(id&&currentView=='chat')loadSuggested(id)}
  else activeDocId='';renderDocs()
}
async function deleteDoc(id){
  if(!confirm('删除此文档？'))return;await fetch(API+'/api/docs/'+id,{method:'DELETE'});
  if(activeDocId===id){activeDocId='';chatHistory=[];renderHistory()}await loadDocs();await loadFolders();toast('已删除')
}
async function uploadFile(inp){
  var f=inp.files[0];if(!f)return;var fd=new FormData();fd.append('file',f);
  toast('处理中...');inp.value='';
  var r=await fetch(API+'/api/upload',{method:'POST',body:fd}),d=await r.json();
  if(d.ok){toast('✅ '+d.doc.title+' · '+d.doc.chunks+' 段落');suggestedQs=d.doc.suggested||[];await loadDocs();await loadFolders();
    if(d.doc.id){activeDocId=d.doc.id;renderDocs();renderSuggested()}}
  else toast('❌ '+(d.error||'失败'))
}

// ─── Q&A + HISTORY ───
function renderSuggested(){
  var c=document.getElementById('suggested-qs'),b=document.getElementById('sq-chips');
  if(!suggestedQs.length){c.style.display='none';return}
  c.style.display='block';b.innerHTML=suggestedQs.map(function(q){return '<span class="sq-chip" onclick="askSuggested(\''+q.replace(/'/g,"&#39;")+'\')">'+q+'</span>'}).join('')
}
async function loadSuggested(id){
  var r=await fetch(API+'/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_id:id})}),d=await r.json();
  suggestedQs=d.questions||[];renderSuggested()
}
function askSuggested(q){document.getElementById('query-input').value=q;askQuestion()}
function renderHistory(){
  var l=document.getElementById('hp-list'),h='';
  chatHistory.forEach(function(m,i){
    var preview=m.content.substring(0,30);h+='<div class="hp-item '+m.role+'" onclick="scrollToMsg('+i+')">'+(m.role==='user'?'👤 ':'🤖 ')+preview+'</div>'
  });
  l.innerHTML=h||'<div style="padding:8px;color:var(--text3);font-size:11px;text-align:center">暂无对话</div>'
}

async function askQuestion(){
  var inp=document.getElementById('query-input'),q=inp.value.trim();if(!q)return;
  if(!allDocs.length){toast('请先上传文档');return}
  addMsg('user',q);inp.value='';chatHistory.push({role:'user',content:q});renderHistory();
  var lid=addMsg('assistant','<em style="color:var(--text3)">分析中...</em>',true);
  var body={query:q,doc_id:activeDocId,folder_id:activeFolderId,history:chatHistory.slice(0,-1)};
  var r=await fetch(API+'/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),d=await r.json();
  removeMsg(lid);var a=d.answer||'无回答';
  if(d.sources&&d.sources.length){a+='<div class="sources">';d.sources.forEach(function(s){a+='<span class="source-tag">📎 '+s.title+'</span>'});a+='</div>'}
  addMsg('assistant',a);chatHistory.push({role:'assistant',content:d.answer||''});renderHistory();
  document.getElementById('chat-empty').style.display='none'
}
function addMsg(role,content,isTmp){
  var area=document.getElementById('chat-inner'),div=document.createElement('div');
  div.className='chat-msg '+role;if(isTmp)div.id='tmp-msg';
  if(role==='assistant'&&typeof marked!=='undefined')content=marked.parse(content);
  div.innerHTML='<div class="bubble">'+content+'</div>';area.appendChild(div);
  document.getElementById('chat-area').scrollTop=document.getElementById('chat-area').scrollHeight;return isTmp?'tmp-msg':null
}
function removeMsg(id){var e=document.getElementById(id);if(e)e.remove()}
function scrollToMsg(idx){/* TODO: scroll to specific message */}

// ─── PODCAST ───
async function generatePodcast(){
  if(!allDocs.length){toast('请先上传文档');return}
  var t=document.getElementById('podcast-topic').value.trim(),d=document.getElementById('podcast-doc').value;
  var area=document.getElementById('podcast-inner');area.innerHTML='<div class="empty-state"><div class="es-icon">⏳</div><h2>生成播客中...</h2></div>';
  document.getElementById('podcast-empty').style.display='none';
  var r=await fetch(API+'/api/podcast',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_id:d,folder_id:activeFolderId,topic:t})});
  var data=await r.json();
  if(data.error){area.innerHTML='<div class="empty-state"><h2>❌ '+data.error+'</h2></div>';return}
  var h='<div class="podcast-script"><h2 style="margin-bottom:12px">🎙️ '+data.title+'</h2>';
  if(data.audio_url)h+='<audio class="audio-player" controls src="'+data.audio_url+'"></audio>';
  (data.script||'').split('\\n').forEach(function(l){l=l.trim();if(!l)return;
    if(l.startsWith('[A]'))h+='<div><span class="speaker host">🎤 主持人</span>'+l.substring(3)+'</div>';
    else if(l.startsWith('[B]'))h+='<div><span class="speaker expert">🎓 专家</span>'+l.substring(3)+'</div>';
    else h+='<div>'+l+'</div>'
  });h+='</div>';area.innerHTML=h;toast('✅ 播客已生成'+(data.audio_url?' · 含语音':''))
}
function updatePodcastSelect(){
  var s=document.getElementById('podcast-doc');s.innerHTML='<option value="">全部文档</option>';
  allDocs.forEach(function(d){s.innerHTML+='<option value="'+d.id+'">'+d.title+'</option>'})
}

// ─── KNOWLEDGE ───
async function openKnowledge(fid){
  document.getElementById('knowledge-modal').style.display='flex';
  document.getElementById('km-summary').innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">⏳ 生成中...</div>';
  document.getElementById('km-mindmap').innerHTML='';
  document.getElementById('km-learning').innerHTML='';
  switchKmTab('summary',document.querySelector('.modal-tab'));
  var f=allFolders.find(function(x){return x.id===fid});
  document.getElementById('km-title').textContent='📊 '+(f?f.name:'未分类')+' · 知识梳理';
  var r=await fetch(API+'/api/folders/'+fid+'/knowledge',{method:'POST'}),d=await r.json();
  kmSummary=d.summary_md||'';mindmapData=d.mindmap||null;kmLearning=d.learning_path||'';
  document.getElementById('km-summary').innerHTML=typeof marked!=='undefined'?marked.parse(kmSummary):kmSummary;
  renderMindmap();renderLearning();
}
function closeKnowledge(){document.getElementById('knowledge-modal').style.display='none'}
function switchKmTab(tab,el){
  document.querySelectorAll('.modal-tab').forEach(function(t){t.classList.toggle('active',t===el)});
  document.querySelectorAll('.modal-tab-content').forEach(function(c){c.classList.toggle('active',c.id==='km-'+tab)})
}
function renderMindmap(){
  var c=document.getElementById('km-mindmap');
  if(!mindmapData){c.innerHTML='<div style="color:var(--text3);padding:20px">暂无数据</div>';return}
  function renderNode(node,depth){var h='<div class="mindmap-node'+(depth===0?' mindmap-root':'')+'"><div class="mn-label">'+node.topic+'</div>';
    if(node.children&&node.children.length){node.children.forEach(function(ch){h+=renderNode(ch,depth+1)})}h+='</div>';return h}
  c.innerHTML='<div class="mindmap-tree">'+renderNode(mindmapData,0)+'</div>'
}
function renderLearning(){
  document.getElementById('km-learning').innerHTML=typeof marked!=='undefined'?marked.parse(kmLearning):kmLearning
}

init();
</script>
</body>
</html>
