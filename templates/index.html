<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebook — AI 研究助手</title>
<script src="/static/marked.min.js"></script>
<style>
:root {
  --bg: #faf7f2;
  --card: #ffffff;
  --accent: #1a73e8;
  --accent-light: #e8f0fe;
  --accent-dark: #1557b0;
  --text: #202124;
  --text2: #5f6368;
  --text3: #80868b;
  --border: #e0e0e0;
  --border-light: #eee;
  --shadow: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.08);
  --radius: 16px;
  --radius-sm: 10px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:260px;background:var(--card);border-right:1px solid var(--border);
  height:100vh;display:flex;flex-direction:column;flex-shrink:0
}
.sidebar-brand{
  padding:14px 16px 10px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border-light)
}
.sidebar-brand .logo{width:28px;height:28px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.sidebar-brand h1{font-size:15px;font-weight:600;color:var(--text)}
.sidebar-brand .ver{font-size:10px;color:var(--text3);margin-left:auto}

/* Folders */
.folder-section{padding:8px 12px}
.folder-item{
  display:flex;align-items:center;padding:6px 10px;border-radius:6px;
  cursor:pointer;font-size:13px;color:var(--text);transition:background .15s;margin-bottom:1px
}
.folder-item:hover{background:#f1f3f4}
.folder-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.folder-item .ficon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.folder-item .fname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folder-item .fcount{font-size:10px;color:var(--text3);background:#f1f3f4;padding:1px 6px;border-radius:8px;flex-shrink:0}
.folder-item.active .fcount{background:#d2e3fc;color:var(--accent)}
.folder-item .fdel{color:#ea4335;opacity:0;font-size:12px;padding:2px;transition:opacity .15s}
.folder-item:hover .fdel{opacity:.6}
.folder-item .fdel:hover{opacity:1}
.new-folder{display:flex;gap:4px;padding:4px 12px 8px}
.new-folder input{
  flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--border);
  font-size:12px;font-family:var(--font);outline:none;background:var(--bg)
}
.new-folder input:focus{border-color:var(--accent);background:#fff}
.new-folder button{
  padding:6px 12px;background:var(--accent);color:#fff;border:none;
  border-radius:6px;font-size:13px;cursor:pointer
}
.new-folder button:hover{background:var(--accent-dark)}

/* Upload */
.upload-zone{
  margin:6px 12px;padding:10px 14px;border:1.5px dashed var(--border);border-radius:8px;
  text-align:center;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px
}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-light)}
.upload-zone .uz-icon{font-size:18px}
.upload-zone .uz-text{font-size:12.5px;color:var(--text2);font-weight:500;flex:1;text-align:left}
.upload-zone .uz-hint{font-size:10px;color:var(--text3)}
.upload-zone input{display:none}
.upload-folder-row{padding:0 12px 8px;font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px}
.upload-folder-row select{font-size:10px;padding:1px 4px;border-radius:4px;border:1px solid var(--border);background:var(--card)}

/* Doc list */
.doc-list{flex:1;overflow-y:auto;padding:0 8px 8px}
.doc-list::-webkit-scrollbar{width:4px}
.doc-list::-webkit-scrollbar-thumb{background:#dadce0;border-radius:4px}
.doc-item{
  padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;
  border:1.5px solid transparent;transition:all .15s;position:relative
}
.doc-item:hover{background:#f8f9fa}
.doc-item.active{background:var(--accent-light);border-color:var(--accent)}
.doc-item .doc-title{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-item .doc-meta{font-size:10.5px;color:var(--text3)}
.doc-item .doc-del{
  position:absolute;top:6px;right:6px;color:#ea4335;font-size:11px;cursor:pointer;
  opacity:0;transition:opacity .15s
}
.doc-item:hover .doc-del{opacity:.7}
.doc-item .doc-del:hover{opacity:1}
.doc-item .doc-folder-sel{margin-top:4px;font-size:10px;padding:2px 4px;border-radius:4px;border:1px solid var(--border);background:var(--card);color:var(--text3)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}
.main-header{
  padding:14px 24px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;gap:6px;background:var(--card)
}
.main-header .tab{
  padding:8px 18px;border-radius:20px;font-size:13.5px;font-weight:600;cursor:pointer;
  border:none;background:transparent;color:var(--text2);transition:all .18s;font-family:var(--font)
}
.main-header .tab:hover{background:#f1f3f4;color:var(--text)}
.main-header .tab.active{background:var(--accent);color:#fff}
.main-header .tab-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.main-header .folder-badge{
  margin-left:auto;font-size:13px;color:var(--text3);display:flex;align-items:center;gap:6px
}

/* CHAT */
.chat-area{flex:1;overflow-y:auto;padding:0}
.chat-area::-webkit-scrollbar{width:5px}
.chat-area::-webkit-scrollbar-thumb{background:#dadce0;border-radius:5px}
.chat-inner{max-width:760px;margin:0 auto;padding:32px 24px}

.suggested-qs{margin-bottom:28px}
.suggested-qs .sq-label{font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.suggested-qs .sq-chips{display:flex;flex-wrap:wrap;gap:8px}
.suggested-qs .sq-chip{
  padding:10px 18px;background:var(--card);border:1px solid var(--border);border-radius:24px;
  font-size:13.5px;cursor:pointer;color:var(--text2);transition:all .18s;font-family:var(--font)
}
.suggested-qs .sq-chip:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

.chat-msg{margin-bottom:24px;max-width:100%}
.chat-msg.user{display:flex;justify-content:flex-end}
.chat-msg.user .bubble{
  background:var(--accent);color:#fff;padding:14px 20px;border-radius:20px 20px 4px 20px;
  font-size:14.5px;line-height:1.55;max-width:80%;word-wrap:break-word
}
.chat-msg.assistant .bubble{
  background:var(--card);border:1px solid var(--border-light);padding:18px 24px;
  border-radius:4px 20px 20px 20px;font-size:14.5px;line-height:1.7;
  box-shadow:var(--shadow)
}
.chat-msg.assistant .bubble h1,.chat-msg.assistant .bubble h2,.chat-msg.assistant .bubble h3{
  margin-top:16px;margin-bottom:8px;font-weight:600
}
.chat-msg.assistant .bubble h2{font-size:17px}
.chat-msg.assistant .bubble h3{font-size:15px}
.chat-msg.assistant .bubble p{margin-bottom:8px}
.chat-msg.assistant .bubble ul,.chat-msg.assistant .bubble ol{padding-left:20px;margin-bottom:8px}
.chat-msg.assistant .bubble li{margin-bottom:4px}
.chat-msg.assistant .bubble strong{color:var(--accent-dark)}
.chat-msg.assistant .bubble table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13.5px}
.chat-msg.assistant .bubble th,.chat-msg.assistant .bubble td{
  border:1px solid var(--border);padding:8px 12px;text-align:left
}
.chat-msg.assistant .bubble th{background:#f8f9fa;font-weight:600}
.chat-msg.assistant .bubble code{
  background:#f1f3f4;padding:2px 6px;border-radius:4px;font-size:13px;font-family:SF Mono,Monaco,monospace
}
.chat-msg.assistant .bubble pre{
  background:#1e1e1e;color:#d4d4d4;padding:14px 18px;border-radius:var(--radius-sm);
  overflow-x:auto;font-size:13px;line-height:1.5;margin:10px 0
}
.chat-msg.assistant .bubble pre code{background:none;padding:0;color:inherit}
.chat-msg .sources{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.chat-msg .source-tag{
  display:inline-flex;align-items:center;gap:4px;padding:4px 12px;background:var(--accent-light);
  border-radius:14px;font-size:12px;color:var(--accent);cursor:pointer;font-weight:500
}
.chat-msg.assistant .bubble blockquote{
  border-left:3px solid var(--accent);padding:8px 14px;margin:10px 0;background:#f8f9fa;border-radius:0 8px 8px 0;color:var(--text2)
}

.empty-state{text-align:center;padding:80px 40px}
.empty-state .es-icon{font-size:56px;margin-bottom:20px;opacity:.8}
.empty-state h2{font-size:22px;font-weight:600;margin-bottom:8px;color:var(--text)}
.empty-state p{font-size:14px;color:var(--text2);max-width:400px;margin:0 auto;line-height:1.6}

.chat-input-wrap{padding:16px 24px;background:var(--card);border-top:1px solid var(--border-light)}
.chat-input-inner{max-width:760px;margin:0 auto;display:flex;gap:10px}
.chat-input-inner textarea{
  flex:1;padding:13px 18px;border-radius:24px;border:1.5px solid var(--border);
  font-size:14.5px;font-family:var(--font);resize:none;outline:none;height:50px;
  transition:border-color .2s;background:#fafafa;line-height:1.5
}
.chat-input-inner textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(26,115,232,.15)}
.chat-input-inner button{
  padding:0 28px;background:var(--accent);color:#fff;border:none;border-radius:24px;
  font-size:15px;font-weight:600;cursor:pointer;transition:.15s;flex-shrink:0;font-family:var(--font)
}
.chat-input-inner button:hover{background:var(--accent-dark);box-shadow:0 2px 8px rgba(26,115,232,.3)}
.chat-input-inner button:disabled{opacity:.6;cursor:default}

/* PODCAST */
.podcast-area{display:none;flex:1;overflow-y:auto}
.podcast-inner{max-width:760px;margin:0 auto;padding:32px 24px}
.podcast-controls{padding:16px 24px;background:var(--card);border-top:1px solid var(--border-light);display:flex;gap:10px;flex-wrap:wrap}
.podcast-controls select,.podcast-controls input{
  padding:10px 16px;border-radius:24px;border:1px solid var(--border);font-size:13.5px;
  font-family:var(--font);cursor:pointer;background:#fafafa;outline:none
}
.podcast-controls input{flex:1;min-width:150px}
.podcast-controls button.primary{
  padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:24px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:.15s
}
.podcast-controls button.primary:hover{background:var(--accent-dark)}
.podcast-script{
  background:var(--card);border-radius:var(--radius);padding:28px 32px;
  border:1px solid var(--border-light);font-size:14.5px;line-height:2;box-shadow:var(--shadow)
}
.podcast-script .speaker{font-weight:700;margin-right:6px}
.podcast-script .host{color:var(--accent)}
.podcast-script .expert{color:#ea4335}
.audio-player{width:100%;margin-top:16px;border-radius:var(--radius-sm)}

.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  background:#202124;color:#fff;padding:12px 28px;border-radius:24px;
  font-size:13.5px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;
  pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2)
}
.toast.show{opacity:1}

/* Chat layout: two columns when doc selected */
.chat-layout{display:flex;flex:1;overflow:hidden}
.chat-layout .chat-messages{flex:1;overflow-y:auto;min-width:0}
.chat-layout .chat-knowledge{
  width:300px;min-width:260px;border-left:1px solid var(--border);
  background:#fafbfc;overflow-y:auto;padding:20px 18px;
  display:none;flex-shrink:0
}
.chat-layout .chat-knowledge.visible{display:block}
.chat-knowledge .ck-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border-light)
}
.chat-knowledge .ck-header h4{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.chat-knowledge .ck-header button{
  background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:2px 6px;border-radius:4px
}
.chat-knowledge .ck-header button:hover{background:var(--accent-light);color:var(--accent)}
.ck-section{margin-bottom:18px}
.ck-section h5{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ck-concept{padding:4px 0;font-size:12.5px;line-height:1.5;color:var(--text)}
.ck-concept strong{color:var(--accent-dark)}
.ck-topic{margin-bottom:10px}
.ck-topic .topic-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;padding:4px 8px;background:var(--accent-light);border-radius:4px}
.ck-topic ul{margin:0;padding-left:16px}
.ck-topic li{font-size:12px;color:var(--text2);margin-bottom:2px;line-height:1.4}
.ck-conclusion{font-size:12.5px;color:var(--text);line-height:1.5;padding:3px 0}
.ck-empty{text-align:center;color:var(--text3);padding:30px 16px;font-size:13px}
.ck-loading{text-align:center;padding:30px 16px}
.ck-loading .spinner-sm{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:kp-spin .8s linear infinite;margin:0 auto 10px}
@keyframes kp-spin{to{transform:rotate(360deg)}}
.chat-layout .chat-knowledge::-webkit-scrollbar{width:4px}
.chat-layout .chat-knowledge::-webkit-scrollbar-thumb{background:#dadce0;border-radius:4px}

}

.ck-raw{font-size:12.5px;line-height:1.6;color:var(--text)}.ck-raw p{margin-bottom:6px}.ck-raw strong{color:var(--accent-dark)}.ck-raw ul,.ck-raw ol{padding-left:16px;margin-bottom:6px}.ck-raw li{margin-bottom:2px}

/* ─── Mobile Responsive ─── */
@media (max-width:768px){
  body{flex-direction:column}
  .sidebar{
    width:100%;height:auto;max-height:42vh;border-right:none;
    border-bottom:1px solid var(--border);flex-shrink:0
  }
  .sidebar.collapsed{max-height:0;overflow:hidden;border-bottom:none}
  .main{height:auto;flex:1;min-height:0}
  .main-header{padding:8px 12px}
  .main-header .tab{padding:6px 14px;font-size:13px}
  .chat-inner,.podcast-inner{padding:16px 12px}
  .chat-layout{flex-direction:column}
  .chat-layout .chat-messages{flex:1;min-height:200px}
  .chat-layout .chat-knowledge{
    width:100%;min-width:0;max-height:40vh;border-left:none;
    border-top:1px solid var(--border);display:none
  }
  .chat-layout .chat-knowledge.visible{display:block}
  .chat-input-wrap{padding:10px 12px}
  .chat-input-inner textarea{font-size:15px}
  .chat-input-inner button{padding:10px 16px;font-size:14px}
  .podcast-controls{flex-wrap:wrap;gap:6px;padding:10px 12px}
  .podcast-controls select,.podcast-controls input{width:100%}
  .podcast-controls button.primary{width:100%}
  .chat-msg .bubble{font-size:14px}
  .chat-msg .source-tag{font-size:11px;padding:2px 6px}
  /* Sidebar toggle button */
  .sidebar-toggle{
    display:flex;align-items:center;justify-content:center;
    padding:8px;background:var(--card);border-bottom:1px solid var(--border);
    cursor:pointer;font-size:14px;color:var(--text2);gap:6px
  }
  .sidebar-toggle:hover{background:var(--accent-light)}
}
@media (min-width:769px){
  .sidebar-toggle{display:none}
}
/* Tablet */
@media (min-width:769px) and (max-width:1024px){
  .sidebar{width:220px}
  .chat-layout .chat-knowledge{width:260px;min-width:220px}
  .chat-inner,.podcast-inner{padding:24px 20px}
}
</style>
</head>
<body>

<div class="sidebar-toggle" onclick="toggleSidebar()">📂 文档管理 ▾</div>
  <div class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">N</div>
    <h1>Notebook</h1>
    <span class="ver">AI</span>
  </div>

  <div class="folder-section">
    <div id="folder-list"></div>
    <div class="new-folder">
      <input id="new-folder-name" placeholder="+ 新建分类" onkeydown="if(event.key==='Enter')createFolder()">
      <button onclick="createFolder()">+</button>
    </div>
  </div>

  <div class="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="uz-icon">📤</div>
    <div class="uz-text">上传文档</div>
    <div class="uz-hint">PDF·DOCX·TXT</div>
    <input type="file" id="file-input" accept=".txt,.md,.pdf,.docx,.csv,.json" onchange="uploadFile(this)">
  </div>
  <div class="upload-folder-row">
    上传到 <select id="upload-folder-sel"><option value="">未分类</option></select>
  </div>

  <div class="doc-list" id="doc-list"></div>
</div><div class="main">
  <div class="main-header">
    <button class="tab active" onclick="switchView('chat')">💬 问答</button>
    <button class="tab" onclick="switchView('podcast')">🎙️ 播客</button>
    <div class="tab-divider"></div>
    <span class="folder-badge" id="folder-badge">📂 全部文档</span>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chat-area">
      <div class="chat-layout">
        <div class="chat-messages" id="chat-messages">
          <div class="chat-inner" id="chat-inner">
            <div class="suggested-qs" id="suggested-qs" style="display:none">
              <div class="sq-label">💡 建议提问</div>
              <div class="sq-chips" id="sq-chips"></div>
            </div>
            <div class="empty-state" id="chat-empty">
              <div class="es-icon">📖</div>
              <h2>上传文档，开始探索</h2>
              <p>支持 PDF、DOCX、TXT、Markdown 格式</p>
            </div>
          </div>
        </div>
        <div class="chat-knowledge" id="chat-knowledge">
          <div class="ck-header">
            <h4>🧠 知识梳理</h4>
            <button onclick="refreshKnowledge()" title="刷新">🔄</button>
          </div>
          <div class="ck-content" id="ck-content">
            <div class="ck-empty">选择文档后自动梳理<br>核心概念与知识结构</div>
          </div>
        </div>
      </div>
    </div>
    <div class="podcast-area" id="podcast-area">
    <div class="podcast-inner" id="podcast-inner">
      <div class="empty-state" id="podcast-empty">
        <div class="es-icon">🎙️</div>
        <h2>AI 双人播客</h2>
        <p>基于文档内容生成自然对话，支持 TTS 语音播放</p>
      </div>
    </div>
  </div>

  <!-- CHAT INPUT -->
  <div class="chat-input-wrap" id="chat-input-wrap">
    <div class="chat-input-inner">
      <textarea id="query-input" placeholder="向文档提问..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askQuestion()}"></textarea>
      <button onclick="askQuestion()">发送</button>
    </div>
  </div>

  <!-- PODCAST CONTROLS -->
  <div class="podcast-controls" id="podcast-controls" style="display:none">
    <select id="podcast-doc"><option value="">全部文档</option></select>
    <input id="podcast-topic" placeholder="播客主题（可选）">
    <button class="primary" onclick="generatePodcast()">🎙️ 生成播客</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var API='',currentView='chat',activeDocId='',activeFolderId='',allDocs=[],allFolders=[],chatHistory=[],suggestedQs=[],TOAST_T;

function toast(m,d){clearTimeout(TOAST_T);var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');TOAST_T=setTimeout(function(){e.classList.remove('show')},d||3000)}
function formatSize(b){if(!b)return'0 B';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}

async function init(){await loadFolders();await loadDocs()}

function switchView(v){
  currentView=v;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',(i==0&&v=='chat')||(i==1&&v=='podcast'))});
  document.getElementById('chat-area').style.display=v=='chat'?'block':'none';
  document.getElementById('chat-input-wrap').style.display=v=='chat'?'flex':'none';
  document.getElementById('podcast-area').style.display=v=='podcast'?'block':'none';
  document.getElementById('podcast-controls').style.display=v=='podcast'?'flex':'none';
  if(v=='podcast')updatePodcastSelect();
}

// ─── FOLDERS ───
async function loadFolders(){
  var r=await fetch(API+'/api/folders'),d=await r.json();
  allFolders=d.folders||[];renderFolders();updateUploadSelect()
}
function renderFolders(){
  var l=document.getElementById('folder-list'),h='';
  h+=fItem('','📂','全部文档','',activeFolderId==='');
  var uc=allDocs.filter(function(d){return!d.folder_id}).length;
  h+=fItem('uncategorized','📄','未分类',uc,activeFolderId==='uncategorized');
  allFolders.forEach(function(f){
    h+=fItem(f.id,'📁',f.name,f.doc_count||0,activeFolderId===f.id);
  });
  l.innerHTML=h
}
function fItem(id,icon,name,count,active){
  var c=active?' active':'';
  return '<div class="folder-item'+c+'" onclick="selectFolder(\''+id+'\')" ondblclick="renameFolderPrompt(\''+id+'\')">'+
    '<span class="ficon">'+icon+'</span>'+
    '<span class="fname">'+name+'</span>'+
    (count!==''?'<span class="fcount">'+count+'</span>':'')+
    (id&&id!=='uncategorized'?'<span class="fdel" onclick="event.stopPropagation();deleteFolder(\''+id+'\')">×</span>':'')+
    '</div>'
}
async function selectFolder(fid){
  if(activeFolderId===fid)return;
  activeFolderId=fid;activeDocId='';chatHistory=[];
  renderFolders();
  var b=document.getElementById('folder-badge');
  if(!fid)b.innerHTML='📂 全部文档';
  else if(fid==='uncategorized')b.innerHTML='📄 未分类';
  else{var f=allFolders.find(function(x){return x.id===fid});b.innerHTML='📁 '+(f?f.name:fid)}
  await loadDocs();document.getElementById('suggested-qs').style.display='none'
}
async function createFolder(){
  var n=document.getElementById('new-folder-name').value.trim();if(!n)return;
  var r=await fetch(API+'/api/folders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});
  var d=await r.json();if(d.ok){toast('已创建：'+n);document.getElementById('new-folder-name').value='';await loadFolders()}
}
async function renameFolderPrompt(id){
  if(!id||id==='uncategorized')return;
  var f=allFolders.find(function(x){return x.id===id});if(!f)return;
  var n=prompt('重命名：',f.name);if(!n||n.trim()===f.name)return;
  var r=await fetch(API+'/api/folders/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n.trim()})});
  if((await r.json()).ok){toast('已重命名');await loadFolders()}
}
async function deleteFolder(id){
  if(!confirm('删除此分类？文档移入未分类。'))return;await fetch(API+'/api/folders/'+id,{method:'DELETE'});
  if(activeFolderId===id)selectFolder('');await loadFolders()
}
function updateUploadSelect(){
  var s=document.getElementById('upload-folder-sel');s.innerHTML='<option value="">未分类</option>';
  allFolders.forEach(function(f){s.innerHTML+='<option value="'+f.id+'">'+f.name+'</option>'})
}

// ─── DOCS ───
async function loadDocs(){
  var u=API+'/api/docs';if(activeFolderId)u+='?folder_id='+activeFolderId;
  var r=await fetch(u),d=await r.json();allDocs=d.documents||[];renderDocs();updatePodcastSelect()
}
function renderDocs(){
  var c=document.getElementById('doc-list');
  if(!allDocs.length){c.innerHTML='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">暂无文档</div>';return}
  var h='';
  allDocs.forEach(function(d){
    h+='<div class="doc-item'+(d.id===activeDocId?' active':'')+'" onclick="selectDoc(\''+d.id+'\')">';
    h+='<span class="doc-del" onclick="event.stopPropagation();deleteDoc(\''+d.id+'\')">✕</span>';
    h+='<div class="doc-title">'+d.title+'</div>';
    h+='<div class="doc-meta">'+d.chunks+' 段落 · '+formatSize(d.size)+'</div>';
    h+='<select class="doc-folder-sel" onchange="moveDoc(\''+d.id+'\',this.value)" onclick="event.stopPropagation()">';
    h+='<option value="">📂 未分类</option>';
    allFolders.forEach(function(f){h+='<option value="'+f.id+'"'+(d.folder_id===f.id?' selected':'')+'>'+f.name+'</option>'});
    h+='</select></div>'
  });
  c.innerHTML=h
}
async function selectDoc(id){
  if(activeDocId!==id){activeDocId=id;chatHistory=[];if(id&&currentView=='chat')loadSuggested(id)}
  else activeDocId='';
  renderDocs()
}
async function moveDoc(docId,folderId){
  await fetch(API+'/api/docs/'+docId+'/move',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({folder_id:folderId||null})});
  toast('已移动');await loadDocs();await loadFolders()
}
async function deleteDoc(id){
  if(!confirm('删除此文档？'))return;await fetch(API+'/api/docs/'+id,{method:'DELETE'});
  if(activeDocId===id){activeDocId='';chatHistory=[]}await loadDocs();await loadFolders();toast('已删除')
}
async function uploadFile(inp){
  var f=inp.files[0];if(!f)return;
  var fd=new FormData();fd.append('file',f);
  var fid=document.getElementById('upload-folder-sel').value;if(fid)fd.append('folder_id',fid);
  toast('处理中...');inp.value='';
  var r=await fetch(API+'/api/upload',{method:'POST',body:fd}),d=await r.json();
  if(d.ok){toast('✅ '+d.doc.title+' · '+d.doc.chunks+' 段落');suggestedQs=d.doc.suggested||[];await loadDocs();await loadFolders();
    if(d.doc.id){activeDocId=d.doc.id;renderDocs();renderSuggested()}}
  else toast('❌ '+(d.error||'失败'))
}

// ─── Q&A ───
function renderSuggested(){
  var c=document.getElementById('suggested-qs'),b=document.getElementById('sq-chips');
  if(!suggestedQs.length){c.style.display='none';return}
  c.style.display='block';b.innerHTML=suggestedQs.map(function(q){return '<span class="sq-chip" onclick="askSuggested(\''+q.replace(/'/g,"&#39;")+'\')">'+q+'</span>'}).join('')
}
async function loadSuggested(id){
  var r=await fetch(API+'/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_id:id})}),d=await r.json();
  suggestedQs=d.questions||[];renderSuggested()
}
function askSuggested(q){document.getElementById('query-input').value=q;askQuestion()}

async function askQuestion(){
  var inp=document.getElementById('query-input'),q=inp.value.trim();if(!q)return;
  if(!allDocs.length){toast('请先上传文档');return}
  addMsg('user',q);inp.value='';chatHistory.push({role:'user',content:q});
  var lid=addMsg('assistant','<em style="color:var(--text3)">分析中...</em>',true);
  var body={query:q,doc_id:activeDocId,folder_id:activeFolderId,history:chatHistory.slice(0,-1)};
  var r=await fetch(API+'/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),d=await r.json();
  removeMsg(lid);
  var a=d.answer||'无回答';
  if(d.sources&&d.sources.length){a+='<div class="sources">';d.sources.forEach(function(s){a+='<span class="source-tag">📎 '+s.title+'</span>'});a+='</div>'}
  addMsg('assistant',a);chatHistory.push({role:'assistant',content:d.answer||''});
  document.getElementById('chat-empty').style.display='none'
}
function addMsg(role,content,isTmp){
  var area=document.getElementById('chat-inner'),div=document.createElement('div');
  div.className='chat-msg '+role;if(isTmp)div.id='tmp-msg';
  if(role==='assistant'&&typeof marked!=='undefined')content=marked.parse(content);
  div.innerHTML='<div class="bubble">'+content+'</div>';area.appendChild(div);
  area.parentElement.scrollTop=area.parentElement.scrollHeight;return isTmp?'tmp-msg':null
}
function removeMsg(id){var e=document.getElementById(id);if(e)e.remove()}

// ─── PODCAST ───
async function generatePodcast(){
  if(!allDocs.length){toast('请先上传文档');return}
  var t=document.getElementById('podcast-topic').value.trim(),d=document.getElementById('podcast-doc').value;
  var area=document.getElementById('podcast-inner');area.innerHTML='<div class="empty-state"><div class="es-icon">⏳</div><h2>生成播客中...</h2></div>';
  document.getElementById('podcast-empty').style.display='none';
  var r=await fetch(API+'/api/podcast',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_id:d,folder_id:activeFolderId,topic:t})});
  var data=await r.json();
  if(data.error){area.innerHTML='<div class="empty-state"><h2>❌ '+data.error+'</h2></div>';return}
  var h='<div class="podcast-script"><h2 style="margin-bottom:16px">🎙️ '+data.title+'</h2>';
  if(data.audio_url)h+='<audio class="audio-player" controls src="'+data.audio_url+'"></audio>';
  (data.script||'').split('\n').forEach(function(l){l=l.trim();if(!l)return;
    if(l.startsWith('[A]'))h+='<div><span class="speaker host">🎤 主持人</span>'+l.substring(3)+'</div>';
    else if(l.startsWith('[B]'))h+='<div><span class="speaker expert">🎓 专家</span>'+l.substring(3)+'</div>';
    else h+='<div>'+l+'</div>'
  });
  h+='</div>';area.innerHTML=h;toast('✅ 播客已生成'+(data.audio_url?' · 含语音':''))
}
function updatePodcastSelect(){
  var s=document.getElementById('podcast-doc');s.innerHTML='<option value="">全部文档</option>';
  allDocs.forEach(function(d){s.innerHTML+='<option value="'+d.id+'">'+d.title+'</option>'})
}
init();

/* ─── Knowledge Panel ─── */
var knowledgeLoaded=false;

async function loadKnowledge(){
  var c=document.getElementById('ck-content');
  c.innerHTML='<div class="ck-loading"><div class="spinner-sm"></div>梳理中...</div>';
  if(!activeDocId&&!activeFolderId){
    c.innerHTML='<div class="ck-empty">选择文档后自动梳理<br>核心概念与知识结构</div>';
    document.getElementById('chat-knowledge').classList.remove('visible');
    return
  }
  document.getElementById('chat-knowledge').classList.add('visible');
  try{
    var b={};if(activeDocId)b.doc_id=activeDocId;if(activeFolderId)b.folder_id=activeFolderId;
    var r=await fetch(API+'/api/knowledge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
    var d=await r.json();
    if(d.error){c.innerHTML='<div class="ck-empty">⚠️ '+d.error+'</div>';knowledgeLoaded=true;return}
    var h='';
    if(d.concepts&&d.concepts.length){
      h+='<div class="ck-section"><h5>💡 核心概念</h5>';
      d.concepts.forEach(function(x){h+='<div class="ck-concept">'+marked.parse(x)+'</div>'});
      h+='</div>'
    }
    if(d.topics&&d.topics.length){
      h+='<div class="ck-section"><h5>🗂 主题结构</h5>';
      d.topics.forEach(function(t){
        h+='<div class="ck-topic"><div class="topic-title">'+t.title+'</div><ul>';
        t.items.forEach(function(i){h+='<li>'+marked.parseInline(i)+'</li>'});
        h+='</ul></div>'
      });
      h+='</div>'
    }
    if(d.conclusions&&d.conclusions.length){
      h+='<div class="ck-section"><h5>📌 关键结论</h5>';
      d.conclusions.forEach(function(x){h+='<div class="ck-conclusion">'+marked.parse(x)+'</div>'});
      h+='</div>'
    }
    if(!d.concepts.length&&!d.topics.length&&!d.conclusions.length&&d.raw){
      h+='<div class="ck-section"><h5>📋 梳理结果</h5><div class="ck-raw">'+marked.parse(d.raw)+'</div></div>'
    }
    c.innerHTML=h||'<div class="ck-empty">未能提取结构化知识</div>';
    knowledgeLoaded=true
  }catch(e){c.innerHTML='<div class="ck-empty">❌ 梳理失败: '+e.message+'</div>'}
}

function refreshKnowledge(){knowledgeLoaded=false;loadKnowledge()}

var _origSelectDoc=selectDoc;
selectDoc=function(id){
  _origSelectDoc(id);
  knowledgeLoaded=false;
  if(activeDocId){loadKnowledge()}
  else{document.getElementById('chat-knowledge').classList.remove('visible')}
};

var _origSelectFolder=selectFolder;
selectFolder=function(fid){
  _origSelectFolder(fid);
  knowledgeLoaded=false;
  if(activeFolderId&&activeFolderId!==''){loadKnowledge()}
};

var _origSwitchView=switchView;
switchView=function(v){
  _origSwitchView(v);
  if(v==='podcast')document.getElementById('chat-knowledge').classList.remove('visible');
  else if(activeDocId||activeFolderId)loadKnowledge();
};


function toggleSidebar(){
  var s=document.querySelector('.sidebar');
  s.classList.toggle('collapsed');
  var t=document.querySelector('.sidebar-toggle');
  t.textContent=s.classList.contains('collapsed')?'📂 文档管理 ▸':'📂 文档管理 ▾';
}
</script>
